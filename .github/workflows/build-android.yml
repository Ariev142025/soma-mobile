name: Build Android APK

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      build_type:
        description: debug atau release
        default: debug
        type: choice
        options: [debug, release]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build-debug:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' || github.event.inputs.build_type == 'debug'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
      - name: Create env
        run: echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env
      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npm run bundle:android
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: soma-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-release:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'release' || github.event.inputs.build_type == 'release'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/soma-release.keystore
      - name: Create env
        run: echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env
      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npm run bundle:android
      - name: Build Release APK
        working-directory: android
        env:
          SOMA_KEYSTORE_PATH: soma-release.keystore
          SOMA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SOMA_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SOMA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon
      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: SOMA Mobile ${{ github.ref_name }}
