name: Build Android APK

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      build_type:
        description: debug atau release
        default: debug
        type: choice
        options: [debug, release]

jobs:
  build-debug:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install dependencies
        run: npm install

      - name: Init React Native Android (generate android/ folder)
        run: |
          npx @react-native-community/cli@15.0.1 init SomaMobileBase \
            --version 0.76.5 \
            --skip-install \
            --directory /tmp/rn-base
          cp -rf /tmp/rn-base/android ./android
          chmod +x android/gradlew

      - name: Patch Android package name
        run: |
          sed -i "s/com.somamobilebase/com.somacontrols.mobile/g" android/app/build.gradle
          sed -i "s/com.somamobilebase/com.somacontrols.mobile/g" android/app/src/main/AndroidManifest.xml
          sed -i "s/com.somamobilebase/com.somacontrols.mobile/g" android/app/src/main/java/com/somamobilebase/MainActivity.kt
          sed -i "s/com.somamobilebase/com.somacontrols.mobile/g" android/app/src/main/java/com/somamobilebase/MainApplication.kt
          mv android/app/src/main/java/com/somamobilebase android/app/src/main/java/com/somacontrols 2>/dev/null || true
          sed -i "s/SomaMobileBase/SomaMobile/g" android/settings.gradle
          sed -i "s/SomaMobileBase/SomaMobile/g" android/app/src/main/res/values/strings.xml
          find android -name "*.kt" -exec sed -i "s/SomaMobileBase/SomaMobile/g" {} \;
          echo "Patch selesai"

      - name: Generate debug keystore
        run: |
          rm -f android/app/debug.keystore
          keytool -genkeypair \
            -v -storetype PKCS12 -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -alias androiddebugkey \
            -keystore android/app/debug.keystore \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

      - name: Create .env
        run: echo "API_BASE_URL=https://somacontrols.com/api" > .env

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Copy Vector Icon Fonts
        run: |
          mkdir -p android/app/src/main/assets/fonts
          # Copy semua font dari react-native-vector-icons
          cp node_modules/react-native-vector-icons/Fonts/*.ttf android/app/src/main/assets/fonts/ 2>/dev/null || true
          echo "Fonts copied: $(ls android/app/src/main/assets/fonts/ | wc -l) files"
          ls android/app/src/main/assets/fonts/

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soma-mobile-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Deploy APK ke VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: android/app/build/outputs/apk/debug/app-debug.apk
          target: /var/www/soma-bms/uploads/
          strip_components: 6

      - name: Rename APK di VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mv /var/www/soma-bms/uploads/app-debug.apk /var/www/soma-bms/uploads/soma-mobile.apk
            echo "APK deployed: $(date)"

      - name: Bundle JS untuk OTA
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output index.android.bundle
          HASH=$(sha256sum index.android.bundle | awk '{print $1}')
          echo "BUNDLE_HASH=$HASH" >> $GITHUB_ENV

      - name: Upload JS bundle ke VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: index.android.bundle
          target: /var/www/soma-bms/uploads/ota/${{ github.sha }}/

      - name: Register OTA release
        run: |
          curl -sf -X POST "https://somacontrols.com/api/ota/releases" \
            -H "Content-Type: application/json" \
            -d '{
              "version": "${{ github.sha }}",
              "platform": "android",
              "bundleUrl": "https://somacontrols.com/uploads/ota/${{ github.sha }}/index.android.bundle",
              "bundleHash": "${{ env.BUNDLE_HASH }}",
              "isMandatory": false,
              "changelog": "${{ github.event.head_commit.message }}"
            }' && echo "OTA release terdaftar"

      - name: Summary
        run: |
          echo "## Build Selesai" >> $GITHUB_STEP_SUMMARY
          echo "APK: https://somacontrols.com/uploads/soma-mobile.apk" >> $GITHUB_STEP_SUMMARY
          echo "OTA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Hash: ${{ env.BUNDLE_HASH }}" >> $GITHUB_STEP_SUMMARY

  build-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install dependencies
        run: npm install

      - name: Init React Native Android
        run: |
          npx @react-native-community/cli@15.0.1 init SomaMobileBase \
            --version 0.76.5 \
            --skip-install \
            --directory /tmp/rn-base
          cp -rf /tmp/rn-base/android ./android
          chmod +x android/gradlew

      - name: Patch Android package name
        run: |
          sed -i "s/com.somamobilebase/com.somacontrols.mobile/g" android/app/build.gradle
          sed -i "s/SomaMobileBase/SomaMobile/g" android/settings.gradle
          find android -name "*.kt" -exec sed -i "s/SomaMobileBase/SomaMobile/g" {} \;

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/soma-release.keystore

      - name: Create .env
        run: echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Release APK
        working-directory: android
        env:
          SOMA_KEYSTORE_PATH: soma-release.keystore
          SOMA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SOMA_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SOMA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: SOMA Mobile ${{ github.ref_name }}
